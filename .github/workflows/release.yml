name: release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build:
    name: build-${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-15-intel
            target: x86_64-apple-darwin
          - os: macos-15
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc

    steps:
      # Pin Node 24 compatible JavaScript actions to avoid the old Node 20 runner warning.
      - uses: actions/checkout@v6.0.1
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.92.0"
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }} --bin ftime

      - name: Package (unix)
        if: runner.os != 'Windows'
        shell: bash
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          mkdir -p dist
          version="${VERSION#v}"
          tar -C "target/${{ matrix.target }}/release" \
            -czf "dist/ftime-${version}-${{ matrix.target }}.tar.gz" \
            ftime
          cp "dist/ftime-${version}-${{ matrix.target }}.tar.gz" \
            "dist/ftime-${{ matrix.target }}.tar.gz"

      - name: Package (windows)
        if: runner.os == 'Windows'
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          $version = $env:VERSION -replace '^v',''
          New-Item -ItemType Directory -Force dist | Out-Null
          Compress-Archive -Path "target\\${{ matrix.target }}\\release\\ftime.exe" `
            -DestinationPath "dist\\ftime-$version-${{ matrix.target }}.zip"
          Copy-Item "dist\\ftime-$version-${{ matrix.target }}.zip" `
            "dist\\ftime-${{ matrix.target }}.zip"

      - name: Package bootstrap scripts
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          cp scripts/install.sh dist/ftime-install.sh
          cp scripts/install.ps1 dist/ftime-install.ps1
          cp scripts/uninstall.sh dist/ftime-uninstall.sh
          cp scripts/uninstall.ps1 dist/ftime-uninstall.ps1

      - name: Upload release assets
        uses: softprops/action-gh-release@v2.6.1
        with:
          files: dist/*
