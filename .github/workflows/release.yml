name: release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  create_release:
    name: create-release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6.0.1

      - name: Create or update release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release edit "$TAG" --title "$TAG" --notes-file docs/RELEASE-NOTES-v2.0.md
          else
            gh release create "$TAG" --title "$TAG" --notes-file docs/RELEASE-NOTES-v2.0.md --verify-tag
          fi

  build:
    name: build-${{ matrix.target }}
    needs: create_release
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-15-intel
            target: x86_64-apple-darwin
          - os: macos-15
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc

    steps:
      - uses: actions/checkout@v6.0.1
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.92.0"
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }} --bin ftime

      - name: Package (unix)
        if: runner.os != 'Windows'
        shell: bash
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          mkdir -p dist
          version="${VERSION#v}"
          tar -C "target/${{ matrix.target }}/release" \
            -czf "dist/ftime-${version}-${{ matrix.target }}.tar.gz" \
            ftime
          cp "dist/ftime-${version}-${{ matrix.target }}.tar.gz" \
            "dist/ftime-${{ matrix.target }}.tar.gz"

      - name: Package (windows)
        if: runner.os == 'Windows'
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          $version = $env:VERSION -replace '^v',''
          New-Item -ItemType Directory -Force dist | Out-Null
          Compress-Archive -Path "target\\${{ matrix.target }}\\release\\ftime.exe" `
            -DestinationPath "dist\\ftime-$version-${{ matrix.target }}.zip"
          Copy-Item "dist\\ftime-$version-${{ matrix.target }}.zip" `
            "dist\\ftime-${{ matrix.target }}.zip"

      - name: Package bootstrap scripts
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          cp scripts/install.sh dist/ftime-install.sh
          cp scripts/install.ps1 dist/ftime-install.ps1
          cp scripts/uninstall.sh dist/ftime-uninstall.sh
          cp scripts/uninstall.ps1 dist/ftime-uninstall.ps1

      - name: Upload release assets (unix)
        if: runner.os != 'Windows'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          gh release upload "$TAG" dist/* --clobber

      - name: Upload release assets (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          $files = Get-ChildItem dist | ForEach-Object { $_.FullName }
          gh release upload $env:TAG $files --clobber
